<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Quiz Master — practice quizzes across subjects, track your progress, and climb the leaderboard."
    />
    <link rel="icon" href="%PUBLIC_URL%/assets/logo.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/assets/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply stored theme before first paint to avoid a flash.
      (function () {
        try {
          if (localStorage.getItem("qm-theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
    <title>Quiz Master</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
